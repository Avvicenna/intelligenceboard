name: SRA — Sentra Reliability Agent (Avvcenna+)

on:
  push:
    branches: [main, develop, 'copilot/fix-ci-job-issues']
  pull_request:
    branches: [main, develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  reliability-check:
    name: SRA Health Scan & Auto-Fix
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '22' }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - name: SRA: Auto-Fix
        run: |
          pnpm install --no-frozen-lockfile
          pnpm lint:fix || true
      - name: SRA: Push Fixes back to Avvcenna+
        run: |
          if [ -n '' ]; then
            git config user.name 'Avvcenna+ Reliability Agent'
            git config user.email 'sra@avvcenna.plus'
            git add .
            git commit -m 'fix: SRA global remediation (Avvcenna+)'
            git push
          fi