# Architected and built by Claudesy.
name: Dashboard Security Baseline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  {}

jobs:
  security-baseline:
    name: Security Baseline
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: intelligenceboard_test
        options: >-
          --health-cmd "pg_isready -U test_user -d intelligenceboard_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    env:
      DATABASE_URL: postgresql://test_user:test_password@localhost:5432/intelligenceboard_test?schema=public
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
        with:
          version: 10
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24.15.0
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install Dependencies
        run: |
          set -o pipefail
          pnpm_log="/tmp/pnpm-install.log"
          trap 'rm -f "$pnpm_log"' EXIT
          set +e
          pnpm install --frozen-lockfile --ignore-scripts 2>&1 | tee "$pnpm_log"
          install_exit=$?
          set -e
          if [ "$install_exit" -ne 0 ]; then
            if grep -q "ERR_PNPM_LOCKFILE_CONFIG_MISMATCH" "$pnpm_log"; then
              echo "❌ Frozen lockfile install failed due to a pnpm lockfile/config mismatch."
              echo "Regenerate and commit pnpm-lock.yaml so CI remains reproducible."
              echo "Run 'pnpm install' locally, review pnpm-lock.yaml, and commit the updated lockfile."
              exit "$install_exit"
            else
              exit "$install_exit"
            fi
          fi
          pnpm run prisma:generate
      - name: Apply Prisma migrations
        run: npx prisma migrate deploy
      - name: Run Security Baseline
        run: |
          export DATABASE_URL="${{ env.DATABASE_URL }}"
          pnpm run security:baseline
